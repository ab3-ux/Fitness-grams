name: Deploy to HubSpot

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      HUBSPOT_ACCOUNT_ID: ${{ secrets.HUBSPOT_ACCOUNT_ID }}
      HUBSPOT_PERSONAL_ACCESS_KEY: ${{ secrets.HUBSPOT_PERSONAL_ACCESS_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install HubSpot CLI
        run: npm install -g @hubspot/cli

      - name: Authenticate HubSpot CLI
        run: |
          printf 'fitnessgrams\n' | hs account auth --personal-access-key="$HUBSPOT_PERSONAL_ACCESS_KEY"

      - name: List authenticated accounts
        run: hs account list

      - name: Upload theme to HubSpot
        run: hs cms upload theme/fitness-grams /fitness-grams --account=fitnessgrams
